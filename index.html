        * {

            box-sizing: border-box
            
            ;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: url(images/pink\ bg\ flash.jpg);
            background-size: cover;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .section {
            display: none;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .genre-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .genre-card {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            border: none;
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .genre-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .genre-card:nth-child(2) { background: linear-gradient(135deg, #eda8d2f1 0%, #fed6e3bb 100%); }
        .genre-card:nth-child(3) { background: linear-gradient(135deg, #fbffd2ec 0%, #fcb69fbb 100%); }
        .genre-card:nth-child(4) { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
        .genre-card:nth-child(5) { background: linear-gradient(135deg, #86eee0ec 0%, #f51c76bd 100%); }
        .genre-card:nth-child(6) { background: linear-gradient(135deg, #e1fda1e1 0%, #c2e9fbb6 100%); }
        .genre-card:nth-child(7) { background: linear-gradient(135deg, #fde4a1 0%, #fbc2c2 100%); }
        .genre-card:nth-child(8) { background: linear-gradient(135deg, #a9fda1 0%, #eec2fbf1 100%); }


        .quiz-container {
            text-align: center;
        }

        .question-number {
            color: #667eea;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .question {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .feedback {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .options {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option {
            background: #f8f9ff;
            border: 2px solid #e1e5f2;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            font-weight: 500;
            position: relative;
        }

        .option:hover:not(.correct):not(.wrong) {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option.correct {
            background: #4CAF50 !important;
            border-color: #4CAF50 !important;
            color: white !important;
        }

        .option.wrong {
            background: #f44336 !important;
            border-color: #f44336 !important;
            color: white !important;
        }

        .option.selected {
            background: #2196F3 !important;
            border-color: #2196F3 !important;
            color: white !important;
        }

        .timer {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 250px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-container {
            text-align: center;
        }

        .score {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .coins {
            font-size: 2rem;
            color: #ffd700;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e1e5f2;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.5s ease;
        }

        @media (max-width: 768px) {
            .container {

                padding: 20px;
            }

            }

            }

            }
        }

            }
        }
        .quit-btn:hover {
            background: #f1868686 !important;


            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }
    </style>
</head>

            if (currentQuestion >= currentQuiz.length) {
                endQuiz();
                return;
            }

            // Reset variables
            selectedAnswer = -1;
            timeUp = false;
            
            const q = currentQuiz[currentQuestion];
            document.getElementById('questionNumber').textContent = 
                `Question ${currentQuestion + 1} of ${currentQuiz.length}`;
            
            document.getElementById('question').textContent = q.q;
            document.getElementById('feedback').style.display = 'none';
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = option;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('nextBtn').disabled = true;
            
            // Update progress bar
            const progress = ((currentQuestion) / currentQuiz.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // Reset and start timer
            timeLeft = 30;
            document.getElementById('timer').textContent = '30s';
            startTimer();
        }

        function selectOption(selectedIndex) {
            if (timeUp) return; // Don't allow selection after time up
            
            selectedAnswer = selectedIndex;
            
            const options = document.querySelectorAll('.option');
            const correctIndex = currentQuiz[currentQuestion].correct;
            
            // Show feedback and highlight correct/wrong
            options.forEach((option, index) => {
                option.classList.remove('selected', 'correct', 'wrong');
                
                if (index === correctIndex) {
                    option.classList.add('correct');
                } else if (index === selectedIndex && selectedIndex !== correctIndex) {
                    option.classList.add('wrong');
                } else if (index === selectedIndex) {
                    option.classList.add('selected');
                }
            });
            
            // Show feedback message
            const feedback = document.getElementById('feedback');
            if (selectedIndex === correctIndex) {
                feedback.textContent = '✅ Correct! Great job!';
                feedback.className = 'feedback correct';
                score++;
            } else {
                feedback.textContent = `❌ Wrong! Correct answer: "${currentQuiz[currentQuestion].options[correctIndex]}"`;
                feedback.className = 'feedback wrong';
            }
            feedback.style.display = 'block';
            
            document.getElementById('nextBtn').disabled = false;
            clearInterval(timerInterval);
        }

        function nextQuestion() {
            currentQuestion++;
            loadQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft + 's';
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timeUp = true;
                    
                    // Auto move to next question after time up
                    setTimeout(() => {
                        nextQuestion(); 
                    }, 1000); // 1 second delay to show time's up
                }
            }, 1000);
        }

        function endQuiz() {
            clearInterval(timerInterval);
            showSection('result');
            
            document.getElementById('finalScore').textContent = `${score}/${currentQuiz.length}`;
            document.getElementById('coinsEarned').textContent = `✨ ${score * 10} Coins Earned!`;
        }

        function restartQuiz() {
            showSection('home');
        }
        function quitQuiz() {
            if (confirm('Are you sure you want to quit? Your progress will be lost.')) {
                clearInterval(timerInterval);
                showSection('home');
            }
        }
    </script>
</body>
</html>
